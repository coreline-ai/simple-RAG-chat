<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG 채팅 - 지식 기반 QA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    header {
      background: #16213e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0f3460;
    }
    header .logo {
      width: 36px; height: 36px;
      background: #e94560;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .badge {
      background: #0f3460;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      color: #a8b2d1;
    }
    header .status {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #64ffda;
    }
    header .status .dot {
      width: 8px; height: 8px;
      background: #64ffda;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 채팅 영역 */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #0f3460;
      border-bottom-left-radius: 4px;
    }

    .message.bot .answer { margin-bottom: 10px; white-space: pre-wrap; }

    .sources {
      border-top: 1px solid #0f3460;
      padding-top: 10px;
      margin-top: 6px;
    }
    .sources summary {
      cursor: pointer;
      font-size: 12px;
      color: #a8b2d1;
      user-select: none;
    }
    .sources summary:hover { color: #64ffda; }
    .source-item {
      margin-top: 8px;
      padding: 8px 10px;
      background: #1a1a2e;
      border-radius: 8px;
      font-size: 12px;
      color: #8892b0;
      line-height: 1.5;
    }
    .source-item .score {
      display: inline-block;
      background: #e94560;
      color: #fff;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      margin-right: 6px;
    }

    /* 로딩 */
    .message.loading .dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #64ffda;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite;
    }
    .message.loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    .message.loading .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* 입력 영역 */
    #input-area {
      padding: 16px 24px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 10px;
    }

    #input-area input {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      color: #eee;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #input-area input:focus { border-color: #64ffda; }
    #input-area input::placeholder { color: #5a6180; }

    #input-area button {
      padding: 12px 24px;
      background: #e94560;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #input-area button:hover { background: #c73e54; }
    #input-area button:disabled { background: #444; cursor: not-allowed; }

    /* 시작 안내 */
    .welcome {
      text-align: center;
      color: #5a6180;
      margin: auto;
      max-width: 400px;
    }
    .welcome h2 { font-size: 20px; color: #a8b2d1; margin-bottom: 12px; }
    .welcome p { font-size: 13px; line-height: 1.8; }
    .welcome .examples {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .welcome .example-btn {
      padding: 10px 14px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      color: #a8b2d1;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .welcome .example-btn:hover {
      border-color: #64ffda;
      color: #64ffda;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">R</div>
  <h1>RAG 채팅</h1>
  <span class="badge">qwen2.5-coder:7b + bge-m3</span>
  <div class="status">
    <span class="dot"></span>
    Ollama 연결됨
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>채팅 로그 기반 QA</h2>
    <p>1만건의 채팅 데이터에서 관련 내용을 검색하고<br>AI가 답변을 생성합니다.</p>
    <div class="examples">
      <button class="example-btn" onclick="askExample(this)">개발팀에서 최근 어떤 작업을 했나요?</button>
      <button class="example-btn" onclick="askExample(this)">보안 관련 이슈가 있었나요?</button>
      <button class="example-btn" onclick="askExample(this)">점심 메뉴로 어떤 것들이 제안되었나요?</button>
      <button class="example-btn" onclick="askExample(this)">휴가를 신청한 사람이 있나요?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <input type="text" id="question" placeholder="질문을 입력하세요..." autofocus
         onkeydown="if(event.key==='Enter') sendQuestion()">
  <button id="send-btn" onclick="sendQuestion()">전송</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('question');
  const sendBtn = document.getElementById('send-btn');
  const welcome = document.getElementById('welcome');

  function askExample(btn) {
    input.value = btn.textContent;
    sendQuestion();
  }

  function addMessage(text, type) {
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addBotMessage(data) {
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = 'message bot';

    let html = `<div class="answer">${escapeHtml(data.answer)}</div>`;

    if (data.sources && data.sources.length > 0) {
      html += `<details class="sources"><summary>출처 ${data.sources.length}건 보기</summary>`;
      data.sources.forEach(s => {
        const preview = escapeHtml(s.content.substring(0, 200));
        html += `<div class="source-item"><span class="score">${(s.score * 100).toFixed(1)}%</span>${preview}...</div>`;
      });
      html += `</details>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addLoading() {
    if (welcome) welcome.remove();
    const div = document.createElement('div');
    div.className = 'message bot loading';
    div.id = 'loading';
    div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeLoading() {
    const el = document.getElementById('loading');
    if (el) el.remove();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function sendQuestion() {
    const q = input.value.trim();
    if (!q) return;

    addMessage(q, 'user');
    input.value = '';
    sendBtn.disabled = true;
    addLoading();

    try {
      const API = window.location.origin !== 'null' ? window.location.origin : 'http://localhost:8000';
      const res = await fetch(API + '/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: 5 }),
      });

      removeLoading();

      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);

      const data = await res.json();
      addBotMessage(data);
    } catch (err) {
      removeLoading();
      addMessage(`오류: ${err.message}`, 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
